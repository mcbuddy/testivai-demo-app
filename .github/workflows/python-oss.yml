# Python OSS lane — playwright-python + pytest against the SAME .testivai/
# baselines as the TS tests (tests-oss/). Report uploaded as an artifact;
# the PR comment/status stays with the main playwright-oss.yml workflow.
name: Python Visual Regression (OSS)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  pull-requests: write  # post diff comment on PRs
  statuses: write       # per-lane commit status (TestivAI / visual (python))

jobs:
  visual-python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install Python deps
        run: |
          pip install pytest pytest-playwright playwright \
            "testivai @ git+https://github.com/mcbuddy/testivai-oss#subdirectory=python"
          playwright install chromium --with-deps

      - name: Serve the built app
        run: |
          npx serve -s dist -l 5173 &
          npx wait-on http://localhost:5173

      - name: Run Python visual tests
        env:
          BASE_URL: http://localhost:5173
        run: pytest tests-py/ -q

      # Same reporter action as the TS lane, namespaced so the two lanes
      # don't overwrite each other's commit status or PR comment. The
      # artifact bundles visual-report/pending-baselines/ (CI's own
      # captures) for baseline adoption.
      - name: Post visual diff results + upload report
        uses: mcbuddy/testivai-oss@v1
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-dir: visual-report
          upload-artifact: true
          artifact-name: testivai-visual-report-python
          status-context: 'TestivAI / visual (python)'
